  <p class="text-center mb-4 mt-4">We’d love to hear from you! Please fill out the form below to send us a message.</p>
    <form>
      <div class="form-inline d-flex justify-content-center ">
        <label for="name">Enter Your Name:</label>
        <input type="text" class="form-control col-md-3 " id="name" placeholder="Enter your name" required style="margin-left: 43px;">
      </div>
      <div class="form-inline d-flex justify-content-center mt-3">
        <label for="email">Enter Your Email:</label>
        <input type="email" class="form-control col-md-3 " id="email" placeholder="Enter your email" required style="margin-left: 44px;">
      </div>
      <div class="form-inline d-flex justify-content-center mt-3">
        <label for="mobile">Enter Your Mobile no:</label>
        <input type="number" class="form-control col-md-3" id="mobile" placeholder="Enter your mobile number" required style="margin-left: 10px;">
      </div>
      <div class="form-inline d-flex justify-content-center mt-3">
        <label for="subject">Enter the Subject: </label>
        <input type="text" class="form-control col-md-3" id="subject" placeholder="Enter the Subject" required style="margin-left: 37px;">
      </div>
      <div class="form-inline d-flex justify-content-center mt-3">
        <label for="message">Enter the Message: </label>
        <input type="text" class="form-control col-md-3" id="message" rows="4" placeholder="Enter the message" required style="margin-left: 26px;">
      </div>
      <button type="submit" onclick="alert('Your message has been submitted successfully!!!!!')" class="btn btn-success mt-3" style="margin-left: 660px;">Submit</button>
      <button type="reset" class="btn btn-danger" style="margin-left: 750px; margin-top: -67px;">Reset</button>
    </form>
